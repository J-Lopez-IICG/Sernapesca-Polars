# --- PLANTAS ---
bd_plantas_raw:
  type: polars.CSVDataset
  filepath: data/01_raw/BD_plantas.csv
  load_args:
    separator: ";"
    ignore_errors: true
    encoding: "iso-8859-1"
    decimal_comma: true

bd_plantas_silver:
  type: polars.EagerPolarsDataset
  file_format: parquet
  filepath: data/02_intermediate/bd_plantas_limpias.parquet

# --- DESEMBARQUE ---
bd_desembarque_raw:
